name: TradeAxis CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: af-south-1
  ECR_REPOSITORY: tradeaxis-api
  ECS_CLUSTER_PROD: tradeaxis-production
  ECS_CLUSTER_STAGING: tradeaxis-staging
  ECS_SERVICE: tradeaxis-api

jobs:
  # ── TEST ─────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: tradeaxis
          POSTGRES_PASSWORD: tradeaxis
          POSTGRES_DB: tradeaxis_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 5s

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply database schema
        run: psql postgresql://tradeaxis:tradeaxis@localhost:5432/tradeaxis_test < schema.sql
        env:
          PGPASSWORD: tradeaxis

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm run test:coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://tradeaxis:tradeaxis@localhost:5432/tradeaxis_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-not-for-production-use-only
          TRADEVAULT_WEBHOOK_SECRET: test-tv-secret
          TRACKGUARD_WEBHOOK_SECRET: test-tg-secret

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: github.ref == 'refs/heads/main'

  # ── BUILD ─────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    outputs:
      image: ${{ steps.build-push.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build-push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── DEPLOY STAGING ────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run DB migrations on staging
        run: |
          aws ecs run-task \
            --cluster $ECS_CLUSTER_STAGING \
            --task-definition tradeaxis-migrate \
            --overrides '{"containerOverrides":[{"name":"tradeaxis-api","command":["npm","run","db:migrate"]}]}' \
            --wait

      - name: Deploy to ECS staging
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER_STAGING \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --image ${{ needs.build.outputs.image }}

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER_STAGING \
            --services $ECS_SERVICE

      - name: Smoke test staging
        run: |
          sleep 10
          curl -f https://api-staging.tradeaxis.miziba.com/health || exit 1

      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Staging deployment ${{ job.status }} — ${{ github.sha }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ── DEPLOY PRODUCTION ─────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production    # Requires manual approval in GitHub Environments

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run DB migrations on production
        run: |
          aws ecs run-task \
            --cluster $ECS_CLUSTER_PROD \
            --task-definition tradeaxis-migrate \
            --overrides '{"containerOverrides":[{"name":"tradeaxis-api","command":["npm","run","db:migrate"]}]}' \
            --wait

      - name: Deploy to ECS production
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER_PROD \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --image ${{ needs.build.outputs.image }}

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER_PROD \
            --services $ECS_SERVICE

      - name: Smoke test production
        run: |
          sleep 15
          curl -f https://api.tradeaxis.miziba.com/health || exit 1

      - name: Tag release
        run: |
          git tag "release-$(date +%Y%m%d-%H%M%S)-${{ github.sha }}"
          git push --tags

      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Production deployment ${{ job.status }} — ${{ github.sha }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
