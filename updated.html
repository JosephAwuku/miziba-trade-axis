function sbdg(s){
  const c=ST[s]||{l:s,c:'#6B7280',bg:'#F9FAFB',br:'#E5E7EB'};
  return '<span class="badge" style="background:'+c.bg+';color:'+c.c+';border:1px solid '+c.br+'">'+c.l+'</span>';

function rbdg(r){
  if(r==null) return '<span class="badge" style="background:#F9FAFB;color:#9CA3AF;border:1px solid #E5E7EB">Pending</span>';
  const c=r>=75?'#16A34A':r>=55?'#D97706':'#DC2626';
  const bg=r>=75?'#F0FDF4':r>=55?'#FFFBEB':'#FEF2F2';
  const br=r>=75?'#BBF7D0':r>=55?'#FDE68A':'#FECACA';
  return '<span class="badge mono" style="background:'+bg+';color:'+c+';border:1px solid '+br+'">'+r+'/100</span>';
}
function kbdg(k){
  const m={VERIFIED:{bg:'#F0FDF4',c:'#16A34A',b:'#BBF7D0'},PENDING:{bg:'#FFFBEB',c:'#D97706',b:'#FDE68A'},FLAGGED:{bg:'#FEF2F2',c:'#DC2626',b:'#FECACA'}};
  const x=m[k]||m.PENDING;
  return '<span class="badge" style="background:'+x.bg+';color:'+x.c+';border:1px solid '+x.b+'">'+k+'</span>';
}

// Notify
let _nt;
function notify(msg,type){
  type=type||'success';
  const el=document.getElementById('notif');
  const m={success:['#F0FDF4','#16A34A','#BBF7D0','✓'],error:['#FEF2F2','#DC2626','#FECACA','⚠'],warning:['#FFFBEB','#D97706','#FDE68A','⚠'],info:['#EFF6FF','#2563EB','#BFDBFE','ℹ']};
  const c=m[type]||m.success;
  el.style.cssText='position:fixed;top:14px;right:14px;z-index:9999;padding:10px 16px;border-radius:8px;font-size:12px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.14);pointer-events:none;max-width:calc(100vw - 28px);background:'+c[0]+';color:'+c[1]+';border:1px solid '+c[2];
  el.textContent=c[3]+' '+msg;
  el.classList.add('show');
  clearTimeout(_nt);_nt=setTimeout(function(){el.classList.remove('show');},3500);
}

// Router
function go(type,val){
  if(type==='role'){S.role=val;S.view='pipeline';S.deal=null;S.tab='overview';S.fdpModal=null;}
  else if(type==='view'){S.view=val;S.deal=null;S.tab='overview';S.fdpModal=null;closeSb();}
  else if(type==='deal'){S.deal=val;S.tab='overview';S.fdpModal=null;closeSb();}
  else if(type==='tab'){S.tab=val;S.fdpModal=null;}
  else if(type==='fps'){S.fpSec=val;closeSb();}
  else if(type==='trs'){S.trSec=val;closeSb();}
  else if(type==='trstep')S.trStep=val;
  render();window.scrollTo(0,0);
}

function toggleVal(id,key){
  if(!S.valState[id]){const t=TRADES.find(function(x){return x.id===id;});S.valState[id]=Object.assign({},t.val);}
  S.valState[id][key]=!S.valState[id][key];render();
}
function setRisk(k,v){S.rscores[k]=v;render();}
function advanceStage(id){
  const t=TRADES.find(function(x){return x.id===id;});if(!t)return;
  const vs=S.valState[id]||t.val;
  if(t.stage==='UNDER_VALIDATION'&&Object.values(vs).filter(Boolean).length<5){notify('Complete all 5 validation items first.','error');return;}
  const keys=Object.keys(ST);const ci=keys.indexOf(t.stage);
  if(ci<keys.length-1){t.stage=keys[ci+1];if(t.stage!=='SUBMITTED')t.kyc='VERIFIED';}
  notify('Deal '+id+' advanced to '+ST[t.stage].l+'.');render();
}
function cfoConfirm(id){S.cfoOk[id]=true;notify('Payment confirmed for '+id+'. Waterfall instruction sent.');render();}
function decide(id,dec){
  S.decisions[id]=dec;
  notify(dec==='approve'?'Facility approved for '+id+'. Escrow instruction sent.':'Facility declined. Deal Officer notified.',dec==='approve'?'success':'error');
  render();
}
function declineDeal(id){
  const el=document.getElementById('dr-'+id);
  const reason=el?el.value:'';
  if(!reason.trim()){notify('Enter a decline reason first.','error');return;}
  S.declineState[id]={reason:reason,date:new Date().toLocaleDateString('en-GB'),officer:S.role};
  notify('Deal '+id+' declined. Reason logged. Trader notified.','info');render();
}
function escalateCEO(id){
  if(!S.ceoEscalation[id])S.ceoEscalation[id]={};
  S.ceoEscalation[id].escalated=true;
  notify('Deal '+id+' escalated to CEO for review.','warning');render();
}
function ceoDecide(id,dec){
  if(!S.ceoEscalation[id])S.ceoEscalation[id]={};
  S.ceoEscalation[id].decision=dec;
  S.ceoEscalation[id].date=new Date().toLocaleDateString('en-GB');
  notify(dec==='approve'?'CEO approved direct submission for '+id+'.':'CEO decision recorded for '+id+'.',dec==='approve'?'success':'warning');
  render();
}
function openFDP(id){S.fdpModal=id;render();}
function closeFDP(){S.fdpModal=null;render();}
function toggleFDPSec(id,sec){
  if(!S.fdpOpenSec[id])S.fdpOpenSec[id]={};
  S.fdpOpenSec[id][sec]=!S.fdpOpenSec[id][sec];render();
}
function toggleClosure(id,key){
  if(!S.closureState[id])S.closureState[id]={};
  S.closureState[id][key]=!S.closureState[id][key];render();
}
function lockTrade(id){
  const t=TRADES.find(function(x){return x.id===id;});if(!t)return;
  const st=S.closureState[id]||{};
  if(Object.keys(st).filter(function(k){return st[k];}).length<7){notify('Complete all 7 closure items first.','error');return;}
  t.stage='CLOSED';notify('Trade '+id+' locked and closed. Record immutable.');render();
}
function npAction(id,step){
  if(!S.npStep[id])S.npStep[id]=0;
  S.npStep[id]=step;
  const msgs={1:'Deal Officer contacted buyer.',3:'CEO informed finance partner of delay.',7:'Formal demand letter issued.',14:'Finance partner and CEO convened.',30:'Formal dispute opened.'};
  notify(msgs[step]||'Action logged.','warning');render();
}

function renderDealDetail(){
  const d=TRADES.find(function(t){return t.id===S.deal;});if(!d)return '';
  if(!S.valState[d.id])S.valState[d.id]=Object.assign({},d.val);
  const vs=S.valState[d.id];
  const pc=Object.values(vs).filter(Boolean).length;
  const ap=pc===5;
  const cm=CMD[d.cmd]||{c:'#888',i:'\u25CF'};
  const rb=d.rb;
  const tr=rb?Object.values(rb).reduce(function(a,v){return a+v;},0):0;
  const rc=tr>=75?'#16A34A':tr>=55?'#D97706':'#DC2626';
  const ci=Object.keys(ST).indexOf(d.stage);
  const canEdit=S.role==='deal_officer'||S.role==='ceo';
  const dec=S.declineState[d.id];
  const esc=S.ceoEscalation[d.id];
  const showDeploy=['PROCURING','DELIVERED','FUNDED'].includes(d.stage);
  const showLogistics=['PROCURING','DELIVERED'].includes(d.stage);
  const showClosure=d.stage==='SETTLED';

  const allTabs=[
    {id:'overview',l:'Overview'},{id:'validation',l:'Checklist'},
    {id:'risk',l:'Risk Score'},{id:'documents',l:'Documents'},{id:'timeline',l:'Timeline'},
  ];
  if(showDeploy)allTabs.push({id:'deployment',l:'Deployment'});
  if(showLogistics)allTabs.push({id:'logistics',l:'Logistics'});
  if(showClosure)allTabs.push({id:'closure',l:'Closure'});

  const tabBar='<div class="tabs">'
    +allTabs.map(function(t){
      return '<button class="tab '+(S.tab===t.id?'on':'')+'" onclick="go(\'tab\',\''+t.id+'\')">'+t.l+'</button>';
    }).join('')
    +'</div>';

  let tabContent='';
  if(S.tab==='overview') tabContent=renderOverviewTab(d);
  else if(S.tab==='validation') tabContent=renderValidationTab(d,vs,pc,ap,canEdit,dec,esc);
  else if(S.tab==='risk') tabContent=renderRiskTab(d,rb,tr,rc);
  else if(S.tab==='documents') tabContent=renderDocsTab(d);
  else if(S.tab==='timeline') tabContent=renderTimelineTab(d,ci);
  else if(S.tab==='deployment'&&showDeploy) tabContent=renderDeploymentTab(d);
  else if(S.tab==='logistics'&&showLogistics) tabContent=renderLogisticsTab(d);
  else if(S.tab==='closure'&&showClosure) tabContent=renderClosureTab(d);

  return '<div class="fade-in">'
    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">'
    +'<button class="btn btn-secondary btn-sm" onclick="go(\'deal\',null)">\u2190 Back</button>'
    +'<div style="flex:1;min-width:0">'
    +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
    +'<span class="mono" style="font-size:16px;font-weight:700;color:#8B0000">'+d.id+'</span>'
    +sbdg(d.stage)+' '+kbdg(d.kyc)+'</div>'
    +'<div style="font-size:11px;color:#6B7280;margin-top:3px">'+d.tr+' \u00B7 '+d.buyer+' ('+d.bc+')'
    +' \u00B7 <span class="badge" style="background:'+cm.c+'15;color:'+cm.c+';border:none">'+cm.i+' '+d.cmd+' Grade '+d.gr+'</span></div>'
    +'</div>'
    +(canEdit&&!['SETTLED','CLOSED'].includes(d.stage)
      ?'<button class="btn btn-primary btn-sm" onclick="advanceStage(\''+d.id+'\')">Advance Stage \u2192</button>'
      :'')
    +'</div>'
    +'<div class="g4" style="margin-bottom:16px">'
    +'<div class="metric"><div class="metric-label">CONTRACT VALUE</div><div class="metric-val" style="font-size:16px">'+usd(d.cv)+'</div></div>'
    +'<div class="metric"><div class="metric-label">FINANCE FACILITY</div><div class="metric-val" style="font-size:16px;color:#7C3AED">'+usd(d.ff)+'</div></div>'
    +'<div class="metric"><div class="metric-label">TRADER EQUITY</div><div class="metric-val" style="font-size:16px;color:#2563EB">'+usd(d.eq)+'</div></div>'
    +'<div class="metric"><div class="metric-label">RISK SCORE</div><div class="metric-val" style="color:'+rc+'">'+(d.risk?d.risk+'/100':'—')+'</div></div>'
    +'</div>'
    +tabBar+tabContent+'</div>';
}

function renderOverviewTab(d){
  const fields=[
    ['Trade ID',d.id,true],['Trader',d.tr,false],['Commodity',d.cmd+' Grade '+d.gr,false],
    ['Volume',mt(d.vol),true],['Buyer',d.buyer+' ('+d.bc+')',false],
    ['Price/MT','$'+d.price.toLocaleString()+'/MT',true],['Contract Value',usd(d.cv),true],
    ['Procurement Cost',usd(d.pc),true],['Trader Equity',usd(d.eq)+' ('+Math.round(d.eq/d.pc*100)+'%)',true],
    ['Finance Facility',usd(d.ff),true],['Delivery Point',d.dp,false],
    ['Deadline',d.dl,true],['Payment Terms',d.pt+' days after delivery',false],
    ['Finance Partner',d.fp||'Not yet assigned',false],['Escrow ID',d.escrow||'Not created',true],
    ['Shipment ID',d.ship||'Not created',true],['Deal Officer',d.off,false],['Applied',d.dt,true]
  ];
  return '<div class="card" style="overflow:hidden">'
    +fields.map(function(f,i){
      return '<div style="display:flex;padding:8px 14px;border-bottom:1px solid #F3F4F6;background:'+(i%2===0?'#fff':'#FAFBFC')+';flex-wrap:wrap;gap:4px">'
        +'<span style="width:160px;flex-shrink:0;font-size:10px;color:#6B7280;font-weight:600">'+f[0]+'</span>'
        +'<span class="'+(f[2]?'mono':'')+'" style="font-size:12px;flex:1;min-width:0">'+f[1]+'</span>'
        +'</div>';
    }).join('')
    +'</div>';
}

function renderValidationTab(d,vs,pc,ap,canEdit,dec,esc){
  const VI=[
    {k:'b',n:1,l:'Buyer Verification',desc:'Registered company confirmed. No sanctions (OFAC, EU, UN). Reference obtained for first-time buyers.',pass:'Registered company. No sanctions. Reference obtained.'},
    {k:'p',n:2,l:'Price Reasonableness',desc:'Contract price within \u00B120% of current ICCO/World Bank/FAO commodity benchmark.',pass:'Price within \u00B120% of market benchmark.'},
    {k:'s',n:3,l:'Sourcing Capacity',desc:'TradePoint network can source required volume within 70% of delivery deadline.',pass:'Network confirms target volume sourceable in timeline.'},
    {k:'k',n:4,l:'Trader KYC & Track Record',desc:'KYC verified, equity feasible, no disputes. Returning trader: 0% default required.',pass:'KYC VERIFIED. 0% default rate. Capital proof confirmed.'},
    {k:'r',n:5,l:'Regulatory Compliance',desc:'Export licence active. No outstanding sanctions, tax obligations or commodity disputes.',pass:'Export licence valid. No outstanding obligations.'},
  ];
  const items=VI.map(function(v){
    return '<div class="chk-item">'
      +'<div class="chk-box '+(vs[v.k]?'on':'')+'" onclick="'+(canEdit?'toggleVal(\''+d.id+'\',\''+v.k+'\')':'')+'">'
      +(vs[v.k]?'<span style="color:#fff;font-size:11px;font-weight:700">\u2713</span>':'')
      +'</div>'
      +'<div style="flex:1;min-width:0">'
      +'<div style="display:flex;align-items:center;gap:7px;margin-bottom:3px;flex-wrap:wrap">'
      +'<span style="font-size:12px;font-weight:600">'+v.n+'. '+v.l+'</span>'
      +'<span class="badge" style="background:'+(vs[v.k]?'#F0FDF4':'#F9FAFB')+';color:'+(vs[v.k]?'#16A34A':'#9CA3AF')+';border:1px solid '+(vs[v.k]?'#BBF7D0':'#E5E7EB')+'">'+(vs[v.k]?'PASS':'PENDING')+'</span>'
      +'</div>'
      +'<p style="font-size:11px;color:#6B7280;margin-bottom:5px">'+v.desc+'</p>'
      +'<div style="background:#F8FAFC;border-radius:5px;padding:5px 8px;font-size:10px;color:#6B7280">'
      +'<b style="color:#374151">Pass criteria:</b> '+v.pass+'</div>'
      +'</div></div>';
  }).join('');

  let declineBlock='';
  if(canEdit&&!dec){
    declineBlock='<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">'
      +(ap?'<button class="btn btn-primary" onclick="openFDP(\''+d.id+'\')">Generate Finance Data Package \u2192</button>':'')
      +(!ap&&pc>0?'<button class="btn btn-warning btn-sm" onclick="escalateCEO(\''+d.id+'\')">Refer to CEO</button>':'')
      +(pc>0?'<button class="btn btn-danger btn-sm" onclick="document.getElementById(\'drf-'+d.id+'\').style.display=\'block\'">Decline Deal</button>':'')
      +'</div>'
      +'<div id="drf-'+d.id+'" style="display:none;margin-top:12px;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:14px">'
      +'<div style="font-size:12px;font-weight:700;color:#DC2626;margin-bottom:8px">Record Decline Reason</div>'
      +'<label>Reason (logged to deal record and trader profile)</label>'
      +'<textarea id="dr-'+d.id+'" rows="3" placeholder="e.g. Trader KYC flagged \u2014 director ID mismatch." style="margin-bottom:10px;font-size:12px"></textarea>'
      +'<div style="display:flex;gap:8px">'
      +'<button class="btn btn-danger btn-sm" onclick="declineDeal(\''+d.id+'\')">Confirm Decline</button>'
      +'<button class="btn btn-secondary btn-sm" onclick="document.getElementById(\'drf-'+d.id+'\').style.display=\'none\'">Cancel</button>'
      +'</div></div>';
  }
  if(dec){
    declineBlock='<div class="alert alert-danger" style="margin-top:10px">'
      +'<div style="font-weight:700;margin-bottom:4px">Deal Declined \u2014 '+dec.date+'</div>'
      +'<p style="font-size:11px">'+dec.reason+'</p>'
      +'<p style="font-size:10px;margin-top:5px;color:#6B7280">Trader notified. May reapply with corrected application.</p>'
      +'</div>';
  }
  let ceoBlock='';
  if(esc&&esc.escalated&&!esc.decision&&S.role==='ceo'){
    ceoBlock='<div style="background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:14px;margin-top:12px">'
      +'<div style="font-size:12px;font-weight:700;color:#92400E;margin-bottom:8px">CEO ESCALATION \u2014 Action Required</div>'
      +'<p style="font-size:11px;color:#6B7280;margin-bottom:12px">Deal Officer escalated for CEO review before Finance Data Package can be sent to finance partner.</p>'
      +'<div style="display:flex;gap:8px;flex-wrap:wrap">'
      +'<button class="btn btn-success btn-sm" onclick="ceoDecide(\''+d.id+'\',\'approve\')">\u2713 Approve Direct Submission</button>'
      +'<button class="btn btn-warning btn-sm" onclick="ceoDecide(\''+d.id+'\',\'more-validation\')">Require More Validation</button>'
      +'<button class="btn btn-danger btn-sm" onclick="ceoDecide(\''+d.id+'\',\'decline\')">Decline</button>'
      +'</div></div>';
  }
  if(esc&&esc.decision){
    const bc=esc.decision==='approve'?'alert-success':esc.decision==='decline'?'alert-danger':'alert-warning';
    const bt=esc.decision==='approve'?'Approved direct submission.':esc.decision==='decline'?'Deal declined by CEO.':'Additional validation required.';
    ceoBlock='<div class="alert '+bc+'" style="margin-top:10px"><b>CEO Decision ('+esc.date+'):</b> '+bt+'</div>';
  }

  return '<div class="g2" style="align-items:start">'
    +'<div>'
    +'<div class="card" style="padding:16px;margin-bottom:12px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    +'<span style="font-size:12px;font-weight:600">Validation Progress</span>'
    +'<span class="mono" style="font-weight:700;color:'+(ap?'#16A34A':'#D97706')+'">'+pc+'/5</span>'
    +'</div>'
    +'<div class="pbar" style="height:8px"><div class="pbar-fill" style="width:'+pc*20+'%;background:'+(ap?'#16A34A':'#D97706')+'"></div></div>'
    +(ap?'<div class="alert alert-success" style="margin-top:10px;margin-bottom:0">\u2713 All items passed. Finance Data Package ready.</div>':'')
    +'</div>'
    +items+declineBlock+ceoBlock
    +'</div>'
    +'<div>'
    +'<div class="card" style="padding:14px;margin-bottom:12px">'
    +'<div style="font-size:10px;font-weight:700;color:#6B7280;letter-spacing:.07em;margin-bottom:12px">THREE NON-NEGOTIABLE RULES</div>'
    +[['1','No finance partner approval = trade does NOT proceed.','#DC2626'],
      ['2','Finance partner ALWAYS paid first in the waterfall.','#D97706'],
      ['3','Miziba earns facilitation fees only \u2014 no trading risk.','#2563EB']
    ].map(function(r){
      return '<div style="display:flex;gap:9px;margin-bottom:11px">'
        +'<div style="width:20px;height:20px;border-radius:4px;background:'+r[2]+';color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+r[0]+'</div>'
        +'<p style="font-size:11px;color:#4B5563;line-height:1.5">'+r[1]+'</p>'
        +'</div>';
    }).join('')
    +'</div>'
    +'<div class="card" style="padding:14px">'
    +'<div style="font-size:10px;font-weight:700;color:#6B7280;letter-spacing:.07em;margin-bottom:10px">VALIDATION OUTCOMES</div>'
    +[['VALIDATED','All 5 items pass. Finance Data Package auto-generated.','#16A34A'],
      ['DECLINED','Failed items logged. Trader notified with specific reasons.','#DC2626'],
      ['REFERRED TO CEO','Notable flag. CEO reviews and approves or declines.','#D97706']
    ].map(function(v){
      return '<div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #F3F4F6">'
        +'<span class="badge" style="background:'+v[2]+'18;color:'+v[2]+';border:none;margin-bottom:4px">'+v[0]+'</span>'
        +'<p style="font-size:10px;color:#6B7280;line-height:1.4">'+v[1]+'</p>'
        +'</div>';
    }).join('')
    +'</div></div></div>';
}

function renderRiskTab(d,rb,tr,rc){
  const DIM=[
    {k:'buyer_risk',l:'Buyer Risk',mx:25},{k:'trader_risk',l:'Trader Risk',mx:25},
    {k:'commodity_price_risk',l:'Commodity & Price',mx:20},
    {k:'sourcing_supply_risk',l:'Sourcing & Supply',mx:15},
    {k:'logistics_delivery_risk',l:'Logistics & Delivery',mx:15}
  ];
  let scoreBlock='<div class="card" style="padding:28px;text-align:center">'
    +'<div style="font-size:28px;margin-bottom:10px">\u2B21</div>'
    +'<div style="font-weight:600">Risk score not yet calculated</div>'
    +'<p style="font-size:11px;color:#6B7280;margin-top:4px">Complete all 5 validation items first.</p>'
    +'</div>';
  if(rb){
    const bars=DIM.map(function(dim){
      const sc=rb[dim.k]||0;
      const pct=Math.round((sc/dim.mx)*100);
      const dc=pct>=70?'#16A34A':pct>=45?'#D97706':'#DC2626';
      return '<div style="margin-bottom:12px">'
        +'<div style="display:flex;justify-content:space-between;margin-bottom:4px">'
        +'<span style="font-size:12px;font-weight:500">'+dim.l+'</span>'
        +'<span class="mono" style="font-size:12px;font-weight:700;color:'+dc+'">'+sc+'/'+dim.mx+'</span>'
        +'</div>'
        +'<div class="pbar"><div class="pbar-fill" style="width:'+pct+'%;background:'+dc+'"></div></div>'
        +'</div>';
    }).join('');
    scoreBlock='<div class="card" style="padding:18px;margin-bottom:14px">'
      +'<div style="display:flex;align-items:center;gap:18px;margin-bottom:18px;flex-wrap:wrap">'
      +'<div style="text-align:center">'
      +'<div class="mono" style="font-size:40px;font-weight:700;color:'+rc+'">'+tr+'</div>'
      +'<div style="font-size:11px;color:#6B7280">/100</div></div>'
      +'<div style="font-size:13px;font-weight:600;color:'+rc+'">'+(tr>=75?'Low Risk':tr>=55?'Moderate Risk \u2014 CEO review':tr>=40?'Elevated Risk \u2014 CEO must approve':'High Risk \u2014 Decline')+'</div>'
      +'</div>'+bars+'</div>';
  }
  let routingBlock='';
  if(d.risk){
    const r=d.risk;
    const rc2=r>=75?'#16A34A':r>=55?'#D97706':r>=40?'#DC2626':'#991B1B';
    const rbg=r>=75?'#F0FDF4':r>=55?'#FFFBEB':'#FEF2F2';
    const rb2=r>=75?'#BBF7D0':r>=55?'#FDE68A':'#FECACA';
    const rl=r>=75?'LOW RISK \u2014 Direct Submission':r>=55?'MODERATE RISK \u2014 CEO Review Required':r>=40?'ELEVATED RISK \u2014 CEO Must Approve':'HIGH RISK \u2014 Decline Deal';
    const rd=r>=75?'Deal Officer may submit Finance Data Package directly without CEO sign-off. Standard 5-day review window.'
      :r>=55?'Present to CEO before submitting. CEO can approve direct submission or require additional validation.'
      :r>=40?'CEO must approve. Additional due diligence: buyer verification, equity increase, sourcing plan review.'
      :'Deal blocked. Discuss with CEO. Trader may reapply with improvements (higher equity, better buyer).';
    routingBlock='<div style="padding:12px 14px;border-radius:8px;margin-bottom:14px;border:1px solid '+rb2+';background:'+rbg+'">'
      +'<div style="font-size:12px;font-weight:700;margin-bottom:4px;color:'+rc2+'">\u2192 '+rl+'</div>'
      +'<p style="font-size:11px;color:#4B5563;line-height:1.5">'+rd+'</p>'
      +'</div>';
  }
  const bandsHtml=[
    ['75\u2013100','Low Risk','#16A34A','Direct submission. Standard 5-day review window.'],
    ['55\u201374','Moderate Risk','#D97706','CEO review before submitting. CEO can approve or require additional validation.'],
    ['40\u201354','Elevated Risk','#DC2626','CEO must approve. Extra buyer verification + equity increase request.'],
    ['< 40','High Risk \u2014 Decline','#991B1B','Deal blocked. Trader may reapply with improvements.']
  ].map(function(b){
    return '<div style="margin-bottom:11px;padding-bottom:11px;border-bottom:1px solid #F3F4F6">'
      +'<div style="display:flex;align-items:center;gap:7px;margin-bottom:3px">'
      +'<span class="mono" style="font-size:11px;font-weight:700;color:'+b[2]+'">'+b[0]+'</span>'
      +'<span class="badge" style="background:'+b[2]+'18;color:'+b[2]+';border:none;font-size:9px">'+b[1].toUpperCase()+'</span>'
      +'</div>'
      +'<p style="font-size:11px;color:#6B7280">'+b[3]+'</p>'
      +'</div>';
  }).join('');
  return '<div class="g2" style="align-items:start">'
    +'<div>'+routingBlock+scoreBlock+'</div>'
    +'<div class="card" style="padding:14px">'
    +'<div style="font-size:10px;font-weight:700;color:#6B7280;letter-spacing:.07em;margin-bottom:12px">ESCALATION RULES</div>'
    +bandsHtml
    +'<div style="font-size:10px;color:#6B7280;background:#F8FAFC;border-radius:6px;padding:9px;line-height:1.5">'
    +'<b>Score Evolution:</b> First-time trader scores 58 \u2192 after first completed trade \u2192 66 \u2192 fourth trade \u2192 76. System incentivises track record building.</div>'
    +'</div></div>';
}

function renderDocsTab(d){
  const ci=Object.keys(ST).indexOf(d.stage);
  const DOCS=[
    {n:'Offtake Contract',by:'Trader',to:'Miziba + Finance Partner',st:ci>0?'ACCEPTED':'PENDING'},
    {n:'KYC Documents',by:'Trader',to:'Miziba internal',st:d.kyc==='VERIFIED'?'ACCEPTED':'UNDER REVIEW'},
    {n:'Finance Data Package',by:'Bridge (auto)',to:'Finance Partner + Miziba',st:ci>=2?'ACCEPTED':'PENDING'},
    {n:'Draft Term Sheet',by:'Bridge (template)',to:'Finance Partner + Trader',st:ci>=3?'ACCEPTED':'PENDING'},
    {n:'Executed Term Sheet',by:'DocuSign',to:'All parties',st:d.escrow?'ACCEPTED':'PENDING'},
    {n:'Escrow Deed',by:'TradeVault',to:'All parties',st:d.escrow?'ACCEPTED':'PENDING'},
    {n:'Chain-of-Custody Certificate',by:'TrackGuard',to:'All parties',st:d.ship?'ACCEPTED':'PENDING'},
    {n:'Buyer Payment Proof',by:'Trader + CFO',to:'Miziba + Finance Partner',st:d.bpay?'ACCEPTED':'PENDING'},
    {n:'Transaction Reconciliation Report',by:'TradeVault',to:'All parties',st:d.stage==='SETTLED'?'ACCEPTED':'PENDING'},
    {n:'Finance Partner Settlement Report',by:'Bridge (compiled)',to:'Finance Partner',st:d.stage==='SETTLED'?'ACCEPTED':'PENDING'},
  ];
  const rows=DOCS.map(function(doc){
    const sc={ACCEPTED:'#16A34A',PENDING:'#9CA3AF','UNDER REVIEW':'#D97706'}[doc.st];
    const sbg={ACCEPTED:'#F0FDF4',PENDING:'#F9FAFB','UNDER REVIEW':'#FFFBEB'}[doc.st];
    const sb2={ACCEPTED:'#BBF7D0',PENDING:'#E5E7EB','UNDER REVIEW':'#FDE68A'}[doc.st];
    return '<tr><td style="font-weight:500">'+doc.n+'</td><td style="color:#6B7280">'+doc.by+'</td>'
      +'<td style="color:#6B7280">'+doc.to+'</td>'
      +'<td><span class="badge" style="background:'+sbg+';color:'+sc+';border:1px solid '+sb2+'">'+doc.st+'</span></td></tr>';
  }).join('');
  return '<div class="card" style="overflow:hidden"><div class="card-head">Documents \u2014 '+d.id+'</div>'
    +'<div style="padding:6px 14px;background:#F8FAFC;border-bottom:1px solid #F3F4F6;font-size:10px;color:#6B7280">'
    +'Version-controlled \u00B7 Role-gated \u00B7 Immutable once executed \u00B7 7-year retention</div>'
    +'<div class="tbl-wrap"><table class="tbl"><thead><tr>'
    +'<th>DOCUMENT</th><th>CREATED BY</th><th>ACCESSIBLE TO</th><th>STATUS</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

  const ITEMS=[
    {k:'wf',l:'All waterfall payments confirmed by receiving parties',det:'Finance partner, Miziba, and trader all confirm receipt of their respective waterfall disbursements.'},
    {k:'trr',l:'Transaction Reconciliation Report (TRR) received from TradeVault',det:'TRR downloaded from TradeVault, attached to trade record. Master financial audit document.'},
    {k:'ccc',l:'Chain-of-Custody Certificate (CCC) received from TrackGuard',det:'CCC downloaded from TrackGuard and attached to trade record. Logistics audit document.'},
    {k:'buyer_perf',l:'Buyer payment performance recorded',det:'Buyer creditworthiness database updated: on-time, late (days), or disputed. Feeds future risk scoring.'},
    {k:'trader_rec',l:'Trader track record updated',det:'Trader profile updated: trades_completed +1, total_volume_mt updated, trader_risk_score recalculated.'},
    {k:'fp_report',l:'Finance partner settlement report generated',det:'TRR + waterfall confirmation + IRIS+ impact metrics compiled and sent to finance partner via portal and email.'},

// ── FINANCE DATA PACKAGE ──────────────────────────────────────────────────────
function renderFDP(id){
  const d=TRADES.find(function(t){return t.id===id;});if(!d)return '';
  const rb=d.rb||{buyer_risk:15,trader_risk:18,commodity_price_risk:14,sourcing_supply_risk:11,logistics_delivery_risk:10};
  const tr=Object.values(rb).reduce(function(a,v){return a+v;},0);
  const score=d.risk||tr;
  const fp_return=Math.round(d.ff*0.12);
  const wf_fp=Math.round(d.ff*1.12);
  const wf_m=Math.round(d.cv*0.015);
  const wf_t=d.cv-wf_fp-wf_m;
  const bkeven=Math.round((d.ff*1.12+d.cv*0.015)/d.vol);
  const open=S.fdpOpenSec[id]||{};

  function mkSec(n,title,body){
    const isOpen=open[n]!==false;
    return '<div class="fdp-sec">'
      +'<div class="fdp-sec-head" onclick="toggleFDPSec(\''+id+'\',\''+n+'\')">'
      +'<div style="display:flex;align-items:center;gap:10px">'
      +'<div style="width:22px;height:22px;border-radius:5px;background:#8B0000;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+n+'</div>'

      +'</div>'
      +'<span style="color:#9CA3AF;font-size:14px">'+(isOpen?'\u25BC':'\u25B6')+'</span>'
      +'</div>'
      +(isOpen?'<div class="fdp-sec-body">'+body+'</div>':'')
      +'</div>';
  }

  const DIM_LABELS={buyer_risk:'Buyer Risk',trader_risk:'Trader Risk',commodity_price_risk:'Commodity & Price',sourcing_supply_risk:'Sourcing & Supply',logistics_delivery_risk:'Logistics & Delivery'};
  const DIM_MAX={buyer_risk:25,trader_risk:25,commodity_price_risk:20,sourcing_supply_risk:15,logistics_delivery_risk:15};

    const k=e[0]; const v=e[1];

      +'<div style="height:100%;width:'+pct+'%;background:'+dc+';border-radius:3px"></div></div>'
      +'<span class="mono" style="font-size:11px;font-weight:700;color:'+dc+';width:40px">'+v+'/'+mx+'</span>'
      +'</div>';
  }).join('');

  const sections=[
    mkSec(1,'Executive Summary',
      row('Trade Reference',id,true)
      +row('Commodity',d.cmd.charAt(0).toUpperCase()+d.cmd.slice(1)+' Grade '+d.gr+' \u2014 '+d.vol+' MT')
      +row('Buyer',d.buyer+' ('+d.bc+')')
      +row('Contract Price','$'+d.price.toLocaleString()+'/MT',true)
      +row('Contract Value',usd(d.cv),true)
      +row('Facility Required',usd(d.ff),true,'#7C3AED')
      +row('Deal Timeline','Procurement by '+d.dl+' \u00B7 Payment '+d.pt+' days after delivery')
      +row('Risk Score',score+'/100 \u2014 '+(score>=75?'LOW RISK':'MODERATE RISK'),true)
      +row('Projected FP Return',usd(fp_return)+' (12% annualised on '+usd(d.ff)+')',true,'#16A34A')
    ),
    mkSec(2,'Buyer Profile',
      row('Buyer Name',d.buyer)
      +row('Country',d.bc)
      +row('Verification','VERIFIED \u2014 No sanctions (OFAC, EU, UN checked)',false,'#16A34A')
      +row('Previous Miziba Trades','2 completed \u00B7 100% on-time payment record')
      +row('Reference','Bank reference obtained from buyer\'s corresponding bank')
    ),
    mkSec(3,'Commodity & Market Analysis',
      row('Commodity',d.cmd.charAt(0).toUpperCase()+d.cmd.slice(1)+' \u2014 food grade')
      +row('Market Price (ICCO)','$1,185/MT \u2014 contract within \u00B15% of benchmark',false,'#16A34A')
      +row('Price Trend (3-month)','Stable \u2014 USD 1,150\u20131,220/MT range')
      +row('EUDR Compliance','Northern Ghana sourcing zones EUDR-compliant. FarmerIQ geo-data registered.')
      +row('Seasonal Availability','Peak harvest. Supply abundant. 14 TradePoints active.')
    ),
    mkSec(4,'Sourcing Plan',
      row('Active TradePoints','Kintampo North, Kintampo South, Techiman Central, Wenchi Junction')
      +row('Farmer Count','340 registered farmers in network')
      +row('MCRS Grade Distribution','Grade A: 68% \u00B7 Grade B: 26% \u00B7 Grade C: 6%')
      +row('90-day Throughput','82 MT at comparable centres \u2014 deal requires 55 MT (67% of capacity)')
      +row('Competing Commitments','None \u2014 no overlapping procurement at these centres')
    ),
    mkSec(5,'Trader Profile',
      row('Company',d.tr)
      +row('Trader ID',d.tid,true)
      +row('KYC Status','VERIFIED \u2014 Certificate of Incorporation, TIN, Director IDs confirmed',false,'#16A34A')
      +row('Bridge Track Record','2 completed trades \u00B7 95 MT total \u00B7 0% default rate',false,'#16A34A')
      +row('Trader Risk Score',score+'/100',true)
      +row('Equity Commitment',usd(d.eq)+' ('+Math.round(d.eq/d.pc*100)+'% of procurement cost)')

// ── RISK CALCULATOR ───────────────────────────────────────────────────────────
function renderRiskCalc(){
  const sc=S.rscores;
  const DIMS=[
    {k:'buyer_risk',l:'Buyer Risk',mx:25,w:'25%',tiers:[[25,'Repeat buyer, clean payment history'],[18,'Repeat buyer, 1 late payment'],[15,'First-time, verified, reference obtained'],[8,'First-time, limited verification'],[0,'Outstanding dispute \u2014 ZERO']]},
    {k:'trader_risk',l:'Trader Risk',mx:25,w:'25%',tiers:[[25,'3+ trades, 0% default'],[18,'1\u20132 trades, 0% default'],[12,'First-time, strong KYC & capital proof'],[6,'First-time, marginal KYC'],[0,'Previous default \u2014 IMMEDIATE DECLINE']]},
    {k:'commodity_price_risk',l:'Commodity & Price',mx:20,w:'20%',tiers:[[20,'Within 5% of benchmark'],[14,'Within 5\u201315%'],[8,'Within 15\u201320%'],[0,'>20% deviation \u2014 CEO review']]},
    {k:'sourcing_supply_risk',l:'Sourcing & Supply',mx:15,w:'15%',tiers:[[15,'<50% of 90-day capacity'],[11,'50\u201380% of capacity'],[6,'80\u2013100% of capacity'],[0,'>100% \u2014 not feasible']]},
    {k:'logistics_delivery_risk',l:'Logistics & Delivery',mx:15,w:'15%',tiers:[[15,'Domestic, full TrackGuard'],[12,'Export, TrackGuard Mode A'],[7,'Cross-border, no GPS'],[3,'No TrackGuard coverage']]},
  ];
  const total=Object.values(sc).reduce(function(a,v){return a+v;},0);
  const tc=total>=75?'#16A34A':total>=55?'#D97706':total>=40?'#DC2626':'#991B1B';
  const tl=total>=75?'Low Risk \u2014 Direct Submission':total>=55?'Moderate Risk \u2014 CEO Review Required':total>=40?'Elevated Risk \u2014 CEO Must Approve':'High Risk \u2014 Decline Deal';
  const rd=total>=75?'Deal Officer may generate Finance Data Package and submit directly. Standard 5-day review window.'
    :total>=55?'Present to CEO before submitting. CEO can approve direct submission or require additional validation.'
    :total>=40?'CEO must approve. Additional due diligence: buyer verification, equity increase, sourcing plan review.'
    :'Deal should not proceed. Discuss with CEO. Trader may reapply with improvements.';

  const dimCards=DIMS.map(function(dim){
    const s=sc[dim.k]; const p=Math.round((s/dim.mx)*100);
    const dc=p>=70?'#16A34A':p>=45?'#D97706':'#DC2626';
    const tiers=dim.tiers.map(function(t){
      return '<div class="risk-tier '+(s===t[0]?'sel':'')+'" onclick="setRisk(\''+dim.k+'\','+t[0]+')">'
        +'<span class="mono" style="font-size:11px;font-weight:700;color:'+(s===t[0]?'#2563EB':'#9CA3AF')+';width:20px;text-align:right;flex-shrink:0">'+t[0]+'</span>'
        +'<span style="font-size:11px;color:'+(s===t[0]?'#111827':'#6B7280')+';line-height:1.4">'+t[1]+'</span>'
        +'</div>';
    }).join('');
    return '<div class="card" style="padding:16px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
      +'<div><div style="font-size:12px;font-weight:600">'+dim.l+'</div>'
      +'<div style="font-size:10px;color:#9CA3AF">'+dim.w+' \u00B7 Max '+dim.mx+'pts</div></div>'
      +'<span class="mono" style="font-size:22px;font-weight:700;color:'+dc+'">'+s+'</span>'
      +'</div>'
      +'<div class="pbar" style="margin-bottom:12px">'
      +'<div class="pbar-fill" style="width:'+p+'%;background:'+dc+'"></div></div>'
      +tiers+'</div>';
  }).join('');

  return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap">'
    +'<div><h2 style="font-size:16px;font-weight:700">Risk Scoring Calculator</h2>'
    +'<p style="font-size:11px;color:#6B7280;margin-top:2px">5 dimensions \u00B7 100 points \u00B7 Click tier to select</p></div>'
    +'<div style="text-align:right"><div class="mono" style="font-size:42px;font-weight:700;color:'+tc+';line-height:1">'+total+'</div>'
    +'<div style="font-size:11px;color:#6B7280">/100</div></div>'
    +'</div>'
    +'<div class="card" style="padding:16px;margin-bottom:14px">'
    +'<div style="display:flex;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px">'
    +'<span style="font-size:13px;font-weight:600;color:'+tc+'">'+tl+'</span>'
    +'<span class="mono" style="font-weight:700;color:'+tc+'">'+total+'/100</span></div>'
    +'<div class="pbar" style="height:10px"><div class="pbar-fill" style="width:'+total+'%;background:'+tc+'"></div></div>'
    +'<div style="display:flex;justify-content:space-between;margin-top:5px;font-size:10px;color:#9CA3AF">'
    +'<span>0</span><span style="color:#991B1B">40 Decline</span><span style="color:#D97706">55 Moderate</span><span style="color:#16A34A">75 Low</span><span>100</span></div>'
    +'<div style="margin-top:12px;padding:10px 12px;background:'+(total>=75?'#F0FDF4':total>=55?'#FFFBEB':'#FEF2F2')+';border:1px solid '+(total>=75?'#BBF7D0':total>=55?'#FDE68A':'#FECACA')+';border-radius:7px;font-size:12px;color:'+tc+';font-weight:500">'+rd+'</div>'
    +'</div>'
    +'<div class="g2">'+dimCards+'</div>';
}

        +'<span class="badge" style="background:'+cm.c+'15;color:'+cm.c+';border:none">'+cm.i+' '+d.cmd+' Gr.'+d.gr+'</span></div>'
        +'<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px">'
        +[['Facility',usd(d.ff)],['Contract',usd(d.cv)],['Equity',usd(d.eq)],['Volume',mt(d.vol)],['Buyer',d.buyer],['Country',d.bc],['Deadline',d.dl],['Delivery',d.dp]].map(function(x){
          return '<div style="background:#F8FAFC;border-radius:6px;padding:8px 10px">'
            +'<div style="font-size:9px;color:#9CA3AF;font-weight:600;margin-bottom:2px">'+x[0].toUpperCase()+'</div>'
            +'<div style="font-size:11px;font-weight:500">'+x[1]+'</div></div>';
        }).join('')
        +'</div>'
        +(rb?'<div style="background:#F8FAFC;border-radius:8px;padding:14px;margin-bottom:14px">'
          +'<div style="font-size:9px;font-weight:700;color:#6B7280;letter-spacing:.06em;margin-bottom:10px">MIZIBA RISK ASSESSMENT</div>'
          +'<div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">'
          +riskBars
          +'<div style="border-left:1px solid #E5E7EB;padding-left:12px;text-align:center">'
          +'<div class="mono" style="font-size:20px;font-weight:700;color:'+rc+'">'+tr2+'/100</div>'
          +'<div style="font-size:9px;color:#9CA3AF">TOTAL</div></div>'
          +'</div></div>':'')
        +'<div style="background:#0D1F3C;border-radius:8px;padding:14px;margin-bottom:14px">'
        +'<div style="font-size:9px;font-weight:700;color:#94A3B8;letter-spacing:.06em;margin-bottom:10px">WATERFALL SETTLEMENT \u2014 TradeVault Enforced</div>'
        +[{n:1,l:'Finance Partner (you)',d2:'Principal + agreed return \u2014 paid first',am:usd(fp2),c:'#C9943A'},
          {n:2,l:'Miziba Facilitation Fee',d2:'1% structuring + 0.5\u20131% settlement',am:usd(mf2),c:'#94A3B8'},
          {n:3,l:'Trader Margin',d2:'Residual \u2014 released last',am:'Residual',c:'#64748B'}].map(function(w){
          return '<div class="wf-tier">'
            +'<div style="width:22px;height:22px;border-radius:50%;background:'+w.c+';color:'+(w.n===3?'#fff':'#0D1F3C')+';font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+w.n+'</div>'
            +'<div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:600;color:'+w.c+'">'+w.l+'</div>'
            +'<div style="font-size:10px;color:#64748B">'+w.d2+'</div></div>'
            +'<span class="mono" style="font-size:11px;font-weight:600;color:'+w.c+';white-space:nowrap">'+w.am+'</span>'
            +'</div>';
        }).join('')
        +'</div>'
        +(!dec
          ?'<div style="display:flex;gap:8px;flex-wrap:wrap">'
            +'<button class="btn btn-success" style="flex:1;min-width:160px" onclick="decide(\''+d.id+'\',\'approve\')">\u2713 Approve Facility \u2014 '+usd(d.ff)+'</button>'
            +'<button class="btn btn-danger" onclick="decide(\''+d.id+'\',\'decline\')">\u2715 Decline</button>'
            +'<button class="btn btn-warning btn-sm" onclick="notify(\'Info request sent to Miziba Deal Officer.\',\'warning\')">Request Info</button>'
            +'</div>'
          :'<div class="alert '+(dec==='approve'?'alert-success':'alert-danger')+'" style="margin-bottom:0;font-size:12px;font-weight:500">'
            +(dec==='approve'?'\u2713 Facility approved. Escrow instruction sent to TradeVault.':'\u2715 Facility declined. Deal Officer notified.')+'</div>'
        )
        +'</div>';
    }).join('');
  })();

  return '<div class="app">'
    +'<div id="sb" class="sb" style="background:#1B2B4D">'
    +'<button class="sb-close" onclick="closeSb()">\u2715</button>'
    +'<div class="sb-brand">'
    +'<div class="logo-box" style="background:linear-gradient(135deg,#C9943A,#8B6914)">E</div>'
    +'<div><div class="sb-title">Ecobank DFI Fund</div><div class="sb-ver">Finance Partner Portal</div></div>'
    +'</div>'
    +'<nav class="sb-nav">'
    +FN.map(function(n){
      return '<button class="nb '+(sec===n.id?'on':'')+'" style="'+(sec===n.id?'background:rgba(201,148,58,.2);color:#E8B96A;border-color:rgba(201,148,58,.4)':'')+'" onclick="go(\'fps\',\''+n.id+'\')">'
        +'<span class="nb-icon">'+n.i+'</span>'+n.l+'</button>';
    }).join('')
    +'</nav>'
    +'<div class="sb-user"><div class="av" style="background:#C9943A">RM</div>'
    +'<div><div style="color:#E2E8F0;font-size:11px;font-weight:500">Relationship Manager</div>'
    +'<div style="color:#64748B;font-size:10px">Finance Partner</div></div>'
    +'<button class="logout-btn" onclick="go(\'role\',null)">\u23CF</button></div>'
    +'</div>'
    +'<div class="main">'
    +'<div class="topbar">'
    +'<div class="topbar-left"><button class="ham-btn" onclick="openSb()">\u2630</button>'
    +'<div style="font-size:14px;font-weight:600">'+(FN.find(function(n){return n.id===sec;})||{l:''}).l+'</div></div>'
    +'<span class="badge" style="background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0">\u25CF Live</span>'
    +'</div>'
    +'<div class="content fade-in">'
    +(sec==='inbox'?inboxContent
      :sec==='portfolio'
        ?'<div style="margin-bottom:14px"><h2 style="font-size:16px;font-weight:700">My Portfolio</h2></div>'
          +'<div class="g3" style="margin-bottom:16px">'
          +'<div class="metric"><div class="metric-label">TOTAL DEALS</div><div class="metric-val">'+myPortfolio.length+'</div></div>'
          +'<div class="metric"><div class="metric-label">CAPITAL DEPLOYED</div><div class="metric-val" style="font-size:16px;color:#7C3AED">'+usd(myPortfolio.reduce(function(a,t){return a+t.ff;},0))+'</div></div>'
          +'<div class="metric"><div class="metric-label">APPROVAL RATE</div><div class="metric-val" style="color:#16A34A">100%</div></div>'
          +'</div>'
          +myPortfolio.map(function(d){
            return '<div class="card" style="padding:14px;margin-bottom:10px;display:flex;gap:14px;align-items:center;flex-wrap:wrap">'
              +'<div style="flex:1;min-width:0"><div style="display:flex;gap:8px;align-items:center;margin-bottom:3px;flex-wrap:wrap">'
              +'<span class="mono" style="font-size:12px;font-weight:700;color:#8B0000">'+d.id+'</span>'+sbdg(d.stage)+'</div>'
              +'<div style="font-size:11px;color:#6B7280">'+d.tr+' \u00B7 '+d.cmd+' \u00B7 '+mt(d.vol)+'</div></div>'
              +'<div style="text-align:right"><div class="mono" style="font-size:14px;font-weight:700">'+usd(d.ff)+'</div>'
              +'<div style="font-size:10px;color:#9CA3AF">Facility</div></div>'+rbdg(d.risk)+'</div>';
          }).join('')
        :sec==='reports'
          ?'<div class="card" style="padding:40px;text-align:center"><div style="font-size:28px;margin-bottom:10px">\u2B22</div>'
            +'<div style="font-size:14px;font-weight:600;margin-bottom:6px">Settlement Reports</div>'
            +'<p style="font-size:11px;color:#6B7280;line-height:1.6">Reports appear once trades reach SETTLED stage. Includes TRR + waterfall breakdown + IRIS+ impact metrics.</p></div>'
          :sec==='onboarding'?renderFPOnboarding():''
    )
    +'</div></div></div>';
}

// ── FP ONBOARDING ─────────────────────────────────────────────────────────────
function renderFPOnboarding(){
  const step=S.fpOnbStep||1;
  const steps=[
    {n:1,l:'Due Diligence on Miziba',desc:"Finance partner reviews Miziba's operations: portfolio track record (8 trades, 0% default), operational documentation, KYC on JNI AGRI Limited, Certificate of Incorporation, audited financials. Site visit to a TradePoint strongly encouraged.",action:'Request Miziba Due Diligence Pack'},
    {n:2,l:'Master Framework Agreement',desc:'Execution of Master Framework Agreement between finance partner and Miziba. Governs: eligible deal criteria, min/max deal size, standard term sheet terms, waterfall priority confirmation, reporting obligations, dispute resolution.',action:'Review & Execute Framework Agreement'},
    {n:3,l:'Portal Access Setup',desc:'Finance partner nominates 2\u20133 users: primary reviewer + backup + senior approver. Ops Admin creates accounts with 2FA. Portal tour conducted by Deal Officer.',action:'Nominate Portal Users'},
    {n:4,l:'Escrow Bank Account Setup',desc:'Finance partner payment details registered: bank name, SWIFT code, account number, account name, corresponding bank (for USD wires). Test payment if required.',action:'Register Bank Account Details'},
    {n:5,l:'First Deal Briefing',desc:'Deal Officer walks finance partner through the Bridge deal flow, explains Finance Data Package sections, clarifies waterfall mechanics, addresses credit committee questions. Typically a 1-hour call.',action:'Schedule First Deal Briefing'},
  ];
  const stepCards=steps.map(function(s){
    return '<div class="card" style="padding:16px;margin-bottom:12px;border-left:4px solid '+(step>s.n?'#16A34A':step===s.n?'#C9943A':'#E5E7EB')+'">'
      +'<div style="display:flex;align-items:flex-start;gap:12px">'
      +'<div style="width:28px;height:28px;border-radius:50%;background:'+(step>s.n?'#16A34A':step===s.n?'#C9943A':'#E5E7EB')+';color:'+(step>s.n||step===s.n?'#fff':'#9CA3AF')+';font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(step>s.n?'\u2713':s.n)+'</div>'
      +'<div style="flex:1">'
      +'<div style="font-size:13px;font-weight:600;margin-bottom:4px;color:'+(step<s.n?'#9CA3AF':'#111827')+'">'+s.l+'</div>'
      +'<p style="font-size:11px;color:#6B7280;margin-bottom:'+(step===s.n?10:0)+'px;line-height:1.5">'+s.desc+'</p>'
      +(step===s.n?'<button class="btn btn-primary btn-sm" onclick="S.fpOnbStep='+(s.n+1)+';render();notify(\'Step '+s.n+' complete.\')">'+s.action+' \u2192</button>':'')
      +(step>s.n?'<span class="badge" style="background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0">\u2713 Completed</span>':'')
      +'</div></div></div>';
  }).join('');
  return '<div>'
    +'<div style="margin-bottom:16px"><h2 style="font-size:16px;font-weight:700">Finance Partner Onboarding</h2>'
    +'<p style="font-size:11px;color:#6B7280;margin-top:2px">One-time process to establish the relationship framework before accessing deals or deploying capital.</p></div>'
    +'<div class="card" style="padding:16px;margin-bottom:16px">'
    +'<div style="display:flex;justify-content:space-between;margin-bottom:8px">'
    +'<span style="font-size:12px;font-weight:600">Onboarding Progress</span>'
    +'<span class="mono" style="font-weight:700;color:'+(step>5?'#16A34A':'#D97706')+'">'+Math.min(step-1,5)+'/5 completed</span>'
    +'</div>'
    +'<div class="pbar" style="height:8px"><div class="pbar-fill" style="width:'+Math.round(Math.min(step-1,5)/5*100)+'%;background:'+(step>5?'#16A34A':'#D97706')+'"></div></div>'
    +'</div>'
    +stepCards
    +(step>5?'<div class="alert alert-success"><div style="font-weight:700;margin-bottom:4px">\u2713 Onboarding Complete</div><p style="font-size:11px">All 5 steps complete. Full access to deal inbox and capital deployment now active.</p></div>':'')
    +'</div>';
}

render();

</script>
